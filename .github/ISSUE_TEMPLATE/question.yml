name: Question
description: Ask a question about using Kashi
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using Kashi? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: "How do I..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any additional context that might help us answer your question
      placeholder: "I'm trying to..."

  - type: textarea
    id: attempted
    attributes:
      label: What You've Tried
      description: What have you already tried?
      placeholder: "I've looked at the documentation and tried..."
