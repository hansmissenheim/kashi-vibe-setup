site_name: Kashi
site_description: Turn song files into Anki cards for non-native language lyric learning
site_url: https://hansmissenheim.github.io/kashi
repo_url: https://github.com/hansmissenheim/kashi
repo_name: hansmissenheim/kashi

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - API Reference: reference/
  - Contributing: contributing.md

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            merge_init_into_class: true
            show_source: false
